<!DOCTYPE html>
<html>
<head>
    <title>Innovatech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Innovatech</h1>

    <p>Frontend desplegado en AWS EC2 con Docker.</p>

    <h2>Respuesta del Backend:</h2>
    <p id="mensaje">Cargando mensaje...</p>

    <script>
        fetch("http://18.232.101.160:3000/api/saludo")
            .then(response => response.json())
            .then(data => {
                document.getElementById("mensaje").innerText = data.mensaje;
            })
            .catch(error => {
                document.getElementById("mensaje").innerText = "Error al conectar con el backend";
                console.error(error);
            });
    </script>

</body>
</html>
